{% load static %}
<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>{% block title %}ZENER{% endblock %}</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Swiper -->
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />

    <!-- CSS -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}">

    <link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">


<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css">

    {% block css %}{% endblock %}
</head>

<body>

    {% include 'clients/partials/navbar.html' %}

    <main>
        {% block content %}
        {% endblock %}
    </main>

    {% include 'clients/partials/footer.html' %}


<!-- Bootstrap -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- Swiper -->
<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

<!-- Confetti -->
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

<!-- Votre JS -->
<script src="{% static 'client/js/main.js' %}"></script>

{% block js %}{% endblock %}

<script>

document.addEventListener("DOMContentLoaded", function(){

    /*
    ==========================================
    COUNTERS
    ==========================================
    */

    const counters = document.querySelectorAll('.counter');

    if(counters.length){

        const observer = new IntersectionObserver(entries => {

            entries.forEach(entry => {

                if(entry.isIntersecting){

                    const counter = entry.target;

                    const target = +counter.dataset.target;

                    let current = 0;

                    const increment = target / 200;

                    const updateCounter = () => {

                        if(current < target){

                            current += increment;

                            counter.innerText = Math.ceil(current);

                            requestAnimationFrame(updateCounter);

                        }else{

                            counter.innerText = target;
                        }
                    };

                    updateCounter();

                    observer.unobserve(counter);

                }

            });

        }, {
            threshold: 0.5
        });

        counters.forEach(counter => {
            observer.observe(counter);
        });
    }

    /*
    ==========================================
    TESTIMONIALS
    ==========================================
    */

    const testimonialText =
        document.getElementById("testimonialText");

    if(testimonialText){

        const testimonials = [

            {
                text:"Nous travaillons avec ZENER depuis plusieurs années pour l'approvisionnement de notre flotte de véhicules. La qualité du service est remarquable.",
                name:"KOMADAN Josué",
                role:"CEO JOSUE THE DESIGNER",
                image:"/static/images/testimonial.png"
            },

            {
                text:"Le professionnalisme des équipes et la disponibilité des produits nous donnent entière satisfaction.",
                name:"AKAKPO Mensah",
                role:"DIRECTEUR GENERAL",
                image:"/static/images/testimonial2.png"
            },

            {
                text:"Un partenaire fiable qui accompagne efficacement notre développement.",
                name:"KOFFI Mawuli",
                role:"RESPONSABLE OPERATIONS",
                image:"/static/images/testimonial3.png"
            }

        ];

        let current = 0;

        window.updateTestimonial = function(){

            document.getElementById("testimonialText").innerText =
                testimonials[current].text;

            document.getElementById("testimonialName").innerText =
                testimonials[current].name;

            document.getElementById("testimonialRole").innerText =
                testimonials[current].role;

            document.getElementById("testimonialImage").src =
                testimonials[current].image;

            document
                .querySelectorAll(".slider-dots-vertical span")
                .forEach(dot => dot.classList.remove("active"));

            document
                .querySelectorAll(".slider-dots-vertical span")[current]
                ?.classList.add("active");
        };

        window.nextTestimonial = function(){

            current++;

            if(current >= testimonials.length){
                current = 0;
            }

            updateTestimonial();
        };

        window.previousTestimonial = function(){

            current--;

            if(current < 0){
                current = testimonials.length - 1;
            }

            updateTestimonial();
        };
    }

    /*
    ==========================================
    SHOP SWIPER
    ==========================================
    */

    if(document.querySelector(".shopSwiper")){

        new Swiper(".shopSwiper", {

            slidesPerView: 3,
            spaceBetween: 30,
            loop: true,

            navigation: {
                nextEl: ".shop-next",
                prevEl: ".shop-prev"
            },

            autoplay: {
                delay: 3000,
                disableOnInteraction: false
            },

            breakpoints: {

                320: {
                    slidesPerView: 1
                },

                768: {
                    slidesPerView: 2
                },

                1200: {
                    slidesPerView: 3
                }
            }
        });
    }

});

</script>

{% if messages %}

<script>

window.addEventListener('load', function(){

    confetti({

        particleCount: 250,

        spread: 180,

        origin: {
            y: 0.6
        }

    });

});

</script>

{% endif %}

</body>
</html>
