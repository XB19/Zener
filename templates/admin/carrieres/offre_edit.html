{% extends 'admin/base.html' %}

{% block content %}

<style>

.form-card{
    background:white;
    border-radius:20px;
    padding:35px;
    box-shadow:0 10px 30px rgba(0,0,0,.06);
}

.form-header{
    margin-bottom:30px;
}

.form-header h1{
    color:#1b60ad;
    font-size:32px;
    font-weight:800;
    margin-bottom:8px;
}

.form-header p{
    color:#64748b;
}

.form-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:25px;
}

.form-group{
    display:flex;
    flex-direction:column;
}

.form-group.full{
    grid-column:span 2;
}

.form-group label{
    margin-bottom:8px;
    color:#163b68;
    font-weight:600;
}

.form-group input,
.form-group select,
.form-group textarea{
    padding:15px;
    border:1px solid #dbe4ef;
    border-radius:12px;
    font-size:15px;
    outline:none;
    transition:.3s;
}

.form-group input:focus,
.form-group select:focus,
.form-group textarea:focus{
    border-color:#1b60ad;
    box-shadow:0 0 0 4px rgba(27,96,173,.10);
}

.form-group textarea{
    min-height:180px;
    resize:vertical;
}

.form-actions{
    margin-top:30px;
    display:flex;
    gap:15px;
}

.btn-save{
    background:#9fc63b;
    color:white;
    border:none;
    padding:15px 30px;
    border-radius:12px;
    font-weight:700;
    cursor:pointer;
    transition:.3s;
}

.btn-save:hover{
    transform:translateY(-3px);
}

.btn-cancel{
    background:#1b60ad;
    color:white;
    text-decoration:none;
    padding:15px 30px;
    border-radius:12px;
    font-weight:700;
}

.offer-status{
    display:inline-block;
    margin-bottom:20px;
    padding:10px 18px;
    border-radius:30px;
    font-weight:700;
}

.status-active{
    background:rgba(159,198,59,.15);
    color:#7ca321;
}

.status-closed{
    background:rgba(220,38,38,.10);
    color:#dc2626;
}

@media(max-width:768px){

    .form-grid{
        grid-template-columns:1fr;
    }

    .form-group.full{
        grid-column:auto;
    }

}

</style>

<div class="form-card">

    <div class="form-header">

        <h1>Modifier l'offre</h1>

        <p>
            Mettre à jour les informations de cette offre d'emploi.
        </p>

    </div>

    {% if offre.actif %}
        <div class="offer-status status-active">
            Offre active
        </div>
    {% else %}
        <div class="offer-status status-closed">
            Offre fermée
        </div>
    {% endif %}

    <form method="POST">

        {% csrf_token %}

        <div class="form-grid">

            <div class="form-group">

                <label>Titre du poste</label>

                <input
                    type="text"
                    name="titre"
                    value="{{ offre.titre }}"
                    required
                >

            </div>

            <div class="form-group">

                <label>Ville</label>

                <input
                    type="text"
                    name="ville"
                    value="{{ offre.ville }}"
                    required
                >

            </div>

            <div class="form-group">

                <label>Type de contrat</label>

                <select name="type_contrat" required>

                    <option value="CDI"
                    {% if offre.type_contrat == 'CDI' %}
                    selected
                    {% endif %}>
                        CDI
                    </option>

                    <option value="CDD"
                    {% if offre.type_contrat == 'CDD' %}
                    selected
                    {% endif %}>
                        CDD
                    </option>

                    <option value="Stage"
                    {% if offre.type_contrat == 'Stage' %}
                    selected
                    {% endif %}>
                        Stage
                    </option>

                    <option value="Temps plein"
                    {% if offre.type_contrat == 'Temps plein' %}
                    selected
                    {% endif %}>
                        Temps plein
                    </option>

                    <option value="Temps partiel"
                    {% if offre.type_contrat == 'Temps partiel' %}
                    selected
                    {% endif %}>
                        Temps partiel
                    </option>

                </select>

            </div>

            <div class="form-group">

                <label>Département</label>

                <input
                    type="text"
                    name="departement"
                    value="{{ offre.departement }}"
                >

            </div>

            <div class="form-group full">

                <label>Description du poste</label>

                <textarea
                    name="description"
                    required
                >{{ offre.description }}</textarea>

            </div>

            <div class="form-group full">

                <label>Missions</label>

                <textarea
                    name="missions"
                    required
                >{{ offre.missions }}</textarea>

            </div>

            <div class="form-group full">

                <label>Profil recherché</label>

                <textarea
                    name="profil"
                    required
                >{{ offre.profil }}</textarea>

            </div>

            <div class="form-group">

                <label>Date limite</label>

                <input
                    type="date"
                    name="date_limite"
                    value="{% if offre.date_limite %}{{ offre.date_limite|date:'Y-m-d' }}{% endif %}"
                >

            </div>

            <div class="form-group">

                <label>Statut</label>

                <select name="actif">

                    <option value="True"
                    {% if offre.actif %}
                    selected
                    {% endif %}>
                        Active
                    </option>

                    <option value="False"
                    {% if not offre.actif %}
                    selected
                    {% endif %}>
                        Fermée
                    </option>

                </select>

            </div>

        </div>

        <div class="form-actions">

            <button
                type="submit"
                class="btn-save">

                Enregistrer les modifications

            </button>

            <a href="{% url 'admin_job_list' %}"
               class="btn-cancel">

                Retour à la liste

            </a>

        </div>

    </form>

</div>

{% endblock %}
