
{% load static %}

<!DOCTYPE html>
<html lang="fr">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>
        Connexion Administration
    </title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Segoe UI',sans-serif;
        }

        body{
            min-height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
            background:
            linear-gradient(
                rgba(27,96,173,.92),
                rgba(27,96,173,.92)
            ),
            url('/static/images/about-hero.png');
            background-size:cover;
            background-position:center;
            padding:20px;
        }

        .login-card{

            width:100%;
            max-width:450px;

            background:white;

            border-radius:20px;

            padding:45px;

            box-shadow:
            0 15px 40px rgba(0,0,0,.15);

        }

        .logo{

            text-align:center;
            margin-bottom:15px;

        }

        .logo h1{

            color:#1b60ad;
            font-size:34px;
            font-weight:800;

        }

        .logo span{

            color:#9fc63b;

        }

        .subtitle{

            text-align:center;
            color:#64748b;
            margin-bottom:35px;

        }

        .form-group{

            margin-bottom:20px;

        }

        .form-group label{

            display:block;
            margin-bottom:8px;

            color:#1e293b;
            font-weight:600;

        }

        .form-group input{

            width:100%;
            height:55px;

            border:1px solid #dbe2ea;

            border-radius:10px;

            padding:0 15px;

            outline:none;

            transition:.3s;

        }

        .form-group input:focus{

            border-color:#1b60ad;

        }

        .login-btn{

            width:100%;
            height:58px;

            border:none;

            border-radius:50px;

            background:#9fc63b;

            color:white;

            font-size:16px;
            font-weight:700;

            cursor:pointer;

            transition:.3s;

        }

        .login-btn:hover{

            transform:translateY(-2px);

        }

        .error-box{

            background:#ffe8e8;

            color:#dc2626;

            padding:14px;

            border-radius:10px;

            margin-bottom:20px;

            text-align:center;

            font-size:14px;

        }

        .footer-text{

            margin-top:25px;

            text-align:center;

            color:#94a3b8;

            font-size:13px;

        }

.logo{
    padding-bottom:10px;
    border-bottom:1px solid #eef2f7;
    margin-bottom:25px;
}

.logo img{

    width:160px;
    height:auto;

    object-fit:contain;

    display:block;
    margin:0 auto;

    transition:.3s;
}

.logo img:hover{
    transform:scale(1.03);
}

    </style>

</head>

<body>

    <div class="login-card">

<div class="logo">

    <img src="{% static 'images/logo.png' %}" alt="ZENER">

</div>

        <p class="subtitle">

            Connectez-vous pour accéder
            au tableau de bord.

        </p>

        {% if messages %}

            {% for message in messages %}

                <div class="error-box">

                    {{ message }}

                </div>

            {% endfor %}

        {% endif %}

        <form method="POST">

            {% csrf_token %}

            <div class="form-group">

                <label>
                    Nom d'utilisateur
                </label>

                <input
                    type="text"
                    name="username"
                    required>

            </div>

            <div class="form-group">

                <label>
                    Mot de passe
                </label>

                <input
                    type="password"
                    name="password"
                    required>

            </div>

            <button
                type="submit"
                class="login-btn">

                Se connecter

            </button>

        </form>

        <div class="footer-text">

            Administration sécurisée Zener

        </div>

    </div>

</body>

</html>
